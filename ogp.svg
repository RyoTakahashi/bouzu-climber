<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="38%" cy="32%" r="72%">
      <stop offset="0%" stop-color="#130820"/>
      <stop offset="100%" stop-color="#050508"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff00cc"/>
      <stop offset="50%"  stop-color="#aa00ff"/>
      <stop offset="100%" stop-color="#00aaff"/>
    </linearGradient>
    <linearGradient id="subGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff88cc"/>
      <stop offset="100%" stop-color="#cc88ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- グロー装飾 -->
  <ellipse cx="220" cy="315" rx="260" ry="260" fill="#8800ff" opacity="0.07"/>
  <ellipse cx="980" cy="315" rx="200" ry="200" fill="#ff00cc" opacity="0.06"/>
  <ellipse cx="600" cy="80"  rx="400" ry="80"  fill="#aa00ff" opacity="0.05"/>

  <!-- グリッド線 -->
  <line x1="0" y1="210" x2="1200" y2="210" stroke="#8800ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="0" y1="420" x2="1200" y2="420" stroke="#8800ff" stroke-width="0.5" opacity="0.15"/>
  <line x1="400" y1="0"  x2="400" y2="630"  stroke="#8800ff" stroke-width="0.5" opacity="0.10"/>
  <line x1="800" y1="0"  x2="800" y2="630"  stroke="#8800ff" stroke-width="0.5" opacity="0.10"/>

  <!-- 外枠 -->
  <rect x="18" y="18" width="1164" height="594" fill="none" stroke="#8800ff" stroke-width="3" rx="22" opacity="0.8"/>
  <rect x="24" y="24" width="1152" height="582" fill="none" stroke="#ff00cc" stroke-width="1" rx="18" opacity="0.3"/>

  <!-- ハサミ -->
  <text x="96" y="180" font-size="90" text-anchor="middle" font-family="serif" fill="#ff00cc" opacity="0.55" filter="url(#glowSoft)">✂</text>
  <text x="1104" y="480" font-size="90" text-anchor="middle" font-family="serif" fill="#8800ff" opacity="0.55" filter="url(#glowSoft)">✂</text>

  <!-- 髪の毛モチーフ -->
  <path d="M60 320 Q120 300 180 320 Q240 340 300 320" fill="none" stroke="#aa00ff" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
  <path d="M60 345 Q130 325 200 345 Q270 365 340 345" fill="none" stroke="#ff00cc" stroke-width="2" opacity="0.18" stroke-linecap="round"/>
  <path d="M900 280 Q960 260 1020 280 Q1080 300 1140 280" fill="none" stroke="#aa00ff" stroke-width="3" opacity="0.25" stroke-linecap="round"/>
  <path d="M880 305 Q950 285 1020 305 Q1090 325 1140 310" fill="none" stroke="#ff00cc" stroke-width="2" opacity="0.18" stroke-linecap="round"/>

  <!-- メインタイトル（textLength で幅を強制指定してはみ出しを防ぐ） -->
  <text x="600" y="268"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Impact, sans-serif"
    font-size="120"
    font-weight="900"
    textLength="1120"
    lengthAdjust="spacingAndGlyphs"
    fill="url(#titleGrad)"
    filter="url(#glow)">BOUZU CLIMBER</text>

  <!-- サブタイトル -->
  <text x="600" y="348"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="16"
    fill="url(#subGrad)"
    filter="url(#glowSoft)">〜坊主への道〜</text>

  <!-- 区切りライン -->
  <line x1="340" y1="378" x2="860" y2="378" stroke="#5500aa" stroke-width="1.5" opacity="0.7"/>

  <!-- 説明文 -->
  <text x="600" y="440"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="30"
    font-weight="700"
    fill="#cc99ff"
    letter-spacing="3">お客さんの髪を刈って坊主にしよう！</text>

  <text x="600" y="490"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    fill="#7755aa"
    letter-spacing="2">フェイント客をかわしながらヘアタワーの高さを競う</text>

  <!-- ハッシュタグ / タグ -->
  <rect x="390" y="528" width="420" height="50" rx="25" fill="#8800ff" opacity="0.18"/>
  <rect x="390" y="528" width="420" height="50" rx="25" fill="none" stroke="#5500aa" stroke-width="1.5"/>
  <text x="600" y="561"
    text-anchor="middle"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="700"
    fill="#aa66ff"
    letter-spacing="4">#BOUZUCLIMBER</text>
</svg>
